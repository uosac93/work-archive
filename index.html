<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 자료실 - 로그인</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: #1a1a2e;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: #16213e;
  border-radius: 16px;
  padding: 48px 40px;
  width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  text-align: center;
}
.lock-icon {
  width: 64px; height: 64px; margin: 0 auto 24px;
  background: rgba(99,102,241,0.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.lock-icon svg { width: 28px; height: 28px; stroke: #818cf8; fill: none; stroke-width: 2; }
h1 { color: #e2e8f0; font-size: 22px; margin-bottom: 8px; font-weight: 600; }
.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }
.input-wrap { position: relative; margin-bottom: 20px; }
input[type="password"] {
  width: 100%; padding: 14px 48px 14px 16px;
  background: #0f172a; border: 1px solid #334155;
  border-radius: 10px; color: #e2e8f0; font-size: 15px;
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: #6366f1; }
.toggle-pw {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; padding: 4px;
}
.toggle-pw svg { width: 20px; height: 20px; stroke: #64748b; fill: none; stroke-width: 2; }
button.submit {
  width: 100%; padding: 14px;
  background: #6366f1; color: #fff;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
button.submit:hover { background: #4f46e5; }
button.submit:disabled { background: #334155; cursor: not-allowed; }
.error { color: #f87171; font-size: 13px; margin-top: 12px; display: none; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="login-box">
  <div class="lock-icon">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <h1>업무 자료실</h1>
  <p class="subtitle">접근하려면 비밀번호를 입력하세요</p>
  <div class="input-wrap">
    <input type="password" id="pw" placeholder="비밀번호 입력" autofocus>
    <button class="toggle-pw" onclick="togglePw()" tabindex="-1">
      <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <button class="submit" id="btn" onclick="decrypt()">로그인</button>
  <p class="error" id="err">비밀번호가 올바르지 않습니다</p>
</div>

document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') decrypt();
});

function togglePw() {
  const input = document.getElementById('pw');
  input.type = input.type === 'password' ? 'text' : 'password';
  input.focus();
}

async function decrypt() {
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if (!pw) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  err.style.display = 'none';

  try {
    const salt = Uint8Array.from(atob(ENCRYPTED.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(ENCRYPTED.iv), c => c.charCodeAt(0));
    const authTag = Uint8Array.from(atob(ENCRYPTED.authTag), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(ENCRYPTED.data), c => c.charCodeAt(0));

    const keyMaterial = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );

    const combined = new Uint8Array(data.length + authTag.length);
    combined.set(data);
    combined.set(authTag, data.length);

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv }, key, combined
    );

    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '로그인';
    err.style.display = 'block';
  }
}
</script>
