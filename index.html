<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박양훈 세무사 — 업무 자료실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  height: 100vh; display: flex; align-items: center; justify-content: center;
  background: #0A0A0F;
  overflow: hidden; position: relative;
}

/* Subtle animated gradient background */
body::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 800px 500px at 25% 25%, rgba(20,20,35,0.6), transparent),
    radial-gradient(ellipse 600px 400px at 75% 75%, rgba(40,30,15,0.2), transparent);
  animation: bgShift 15s ease-in-out infinite alternate;
}
@keyframes bgShift {
  0% { opacity: 0.8; }
  100% { opacity: 1; }
}

/* Floating particles */
.particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.particle {
  position: absolute; width: 2px; height: 2px;
  background: rgba(180,170,140,0.12); border-radius: 50%;
  animation: float linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* Card */
.login-card {
  position: relative; z-index: 1;
  width: 440px; max-width: 92vw;
  background: rgba(14,14,22,0.8);
  backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
  border: 1px solid rgba(180,170,140,0.08);
  border-radius: 20px;
  padding: 56px 48px 48px;
  text-align: center;
  box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    0 32px 80px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.03);
  animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes cardIn {
  0% { opacity: 0; transform: translateY(24px) scale(0.97); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* Top label */
.firm-label {
  font-size: 11.5px; font-weight: 500;
  color: #B4AA8C;
  letter-spacing: 4px; text-transform: uppercase;
  margin-bottom: 14px;
}

/* Title */
h1 {
  font-family: 'Noto Serif KR', serif;
  color: #F0EDE6; font-size: 28px; font-weight: 700;
  margin-bottom: 40px; letter-spacing: -0.3px;
}

/* Divider line */
.divider {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, #B4AA8C, transparent);
  margin: 0 auto 36px;
}

/* Form area */
.form-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(180,170,140,0.06);
  border-radius: 14px;
  padding: 28px 24px 24px;
  margin-bottom: 24px;
}

.input-group { margin-bottom: 18px; text-align: left; }
.input-group:last-of-type { margin-bottom: 0; }
.input-group label {
  display: block;
  font-size: 12px; font-weight: 500;
  color: #8090A8; margin-bottom: 8px;
  letter-spacing: 0.3px;
}
.input-wrap { position: relative; }
input[type="password"], input[type="text"] {
  width: 100%; padding: 14px 44px 14px 16px;
  background: #FFFFFF;
  border: 1px solid rgba(200,200,200,0.3);
  border-radius: 10px; color: #1a1a2e; font-size: 15px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none; transition: all 0.25s ease;
}
input:focus {
  border-color: #B4AA8C;
  box-shadow: 0 0 0 3px rgba(180,170,140,0.15);
}
input::placeholder { color: #b0b0b0; }

.toggle-pw {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; padding: 4px;
  opacity: 0.35; transition: opacity 0.2s;
}
.toggle-pw:hover { opacity: 0.6; }
.toggle-pw svg { width: 18px; height: 18px; stroke: #555; fill: none; stroke-width: 2; }

/* Gold button */
button.submit {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #C5A55A, #B8963F);
  color: #fff; border: none; border-radius: 12px;
  font-size: 15.5px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: all 0.3s ease;
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(197,165,90,0.25);
}
button.submit:hover {
  background: linear-gradient(135deg, #D4B46A, #C5A55A);
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(197,165,90,0.35);
}
button.submit:active { transform: translateY(0); }
button.submit:disabled { background: #2A3040; color: #556; cursor: not-allowed; box-shadow: none; transform: none; }

.error {
  color: #E8755A; font-size: 13px; margin-top: 16px;
  display: none; animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* Footer */
.footer-text {
  margin-top: 28px;
  font-size: 12.5px; color: #506070;
  transition: color 0.2s;
}

.footer-security {
  margin-top: 20px;
  font-size: 10.5px; color: #3A4555;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.footer-security svg { width: 11px; height: 11px; stroke: #3A4555; fill: none; stroke-width: 2; }

.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 480px) {
  .login-card { padding: 40px 24px 36px; border-radius: 16px; }
  .form-card { padding: 22px 18px 18px; }
  h1 { font-size: 24px; }
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="login-card">
  <p class="firm-label">Tax Office</p>
  <h1>박양훈 세무사</h1>
  <div class="divider"></div>

  <div class="form-card">
    <div class="input-group">
      <label>비밀번호</label>
      <div class="input-wrap">
        <input type="password" id="pw" placeholder="비밀번호를 입력하세요" autofocus>
        <button class="toggle-pw" onclick="togglePw()" tabindex="-1" aria-label="비밀번호 보기">
          <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
  </div>

  <button class="submit" id="btn" onclick="decrypt()">로그인</button>
  <p class="error" id="err">비밀번호가 올바르지 않습니다</p>

  <p class="footer-text">업무 자료실</p>
  <div class="footer-security">
    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    AES-256 암호화 보호
  </div>
</div>

<script>
(function() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (10 + Math.random() * 15) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.width = p.style.height = (1.5 + Math.random() * 2.5) + 'px';
    container.appendChild(p);
  }
})();
</script>

document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') decrypt();
});

function togglePw() {
  const input = document.getElementById('pw');
  input.type = input.type === 'password' ? 'text' : 'password';
  input.focus();
}

async function decrypt() {
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if (!pw) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  err.style.display = 'none';

  try {
    const salt = Uint8Array.from(atob(ENCRYPTED.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(ENCRYPTED.iv), c => c.charCodeAt(0));
    const authTag = Uint8Array.from(atob(ENCRYPTED.authTag), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(ENCRYPTED.data), c => c.charCodeAt(0));

    const keyMaterial = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );

    const combined = new Uint8Array(data.length + authTag.length);
    combined.set(data);
    combined.set(authTag, data.length);

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv }, key, combined
    );

    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '로그인';
    err.style.display = 'block';
  }
}
</script>
