<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박양훈 세무사 — 업무 자료실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #0D1117;
  position: relative; padding: 20px;
}

/* Header area - outside card */
.header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeDown 0.6s ease;
}
@keyframes fadeDown {
  0% { opacity: 0; transform: translateY(-12px); }
  100% { opacity: 1; transform: translateY(0); }
}
.header-label {
  font-size: 11px; font-weight: 500;
  color: #C5A55A;
  letter-spacing: 5px; text-transform: uppercase;
  margin-bottom: 12px;
}
.header-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 30px; font-weight: 700;
  color: #E8E6E1;
  letter-spacing: -0.5px;
}

/* Card */
.login-card {
  width: 420px; max-width: 100%;
  background: rgba(22,27,34,0.9);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 36px 32px 32px;
  box-shadow: 0 16px 64px rgba(0,0,0,0.5);
  animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes cardIn {
  0% { opacity: 0; transform: translateY(20px) scale(0.97); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* Input group */
.input-group { margin-bottom: 20px; }
.input-group label {
  display: block; text-align: left;
  font-size: 13px; font-weight: 500;
  color: #C5A55A; margin-bottom: 10px;
}
.input-wrap { position: relative; }
input[type="password"], input[type="text"] {
  width: 100%; height: 52px; padding: 0 44px 0 18px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; color: #E8E6E1; font-size: 15px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none; transition: all 0.25s ease;
}
input:focus {
  border-color: #C5A55A;
  background: rgba(255,255,255,0.03);
}
input::placeholder { color: rgba(255,255,255,0.35); }

.toggle-pw {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; padding: 4px;
  opacity: 0.3; transition: opacity 0.2s;
}
.toggle-pw:hover { opacity: 0.6; }
.toggle-pw svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.35); fill: none; stroke-width: 2; }

/* Gold button */
button.submit {
  width: 100%; height: 52px; padding: 0;
  background: linear-gradient(135deg, #C9A84C, #B8963F);
  color: #FFFFFF; border: none; border-radius: 8px;
  font-size: 16px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  cursor: pointer; transition: all 0.25s ease;
  letter-spacing: 1.5px;
}
button.submit:hover {
  background: linear-gradient(135deg, #D4B46A, #C9A84C);
  box-shadow: 0 4px 20px rgba(197,165,90,0.3);
}
button.submit:active { transform: scale(0.99); }
button.submit:disabled { background: #2A2F38; color: #555; cursor: not-allowed; box-shadow: none; }

.error {
  color: #E8755A; font-size: 13px; margin-top: 14px;
  display: none; text-align: center;
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}


.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile */
@media (max-width: 480px) {
  .header { margin-bottom: 24px; }
  .header-title { font-size: 24px; }
  .header-label { font-size: 10px; letter-spacing: 4px; }
  .login-card { padding: 28px 22px 24px; border-radius: 14px; }
  input[type="password"], input[type="text"] { padding: 14px 40px 14px 14px; font-size: 14px; }
  button.submit { padding: 14px; font-size: 14px; }
}
</style>
</head>
<body>

<div class="header">
  <p class="header-label">Tax Office</p>
  <h1 class="header-title">박양훈 세무사</h1>
</div>

<div class="login-card">
  <div class="input-group">
    <label>비밀번호</label>
    <div class="input-wrap">
      <input type="password" id="pw" placeholder="비밀번호를 입력하세요" autofocus>
      <button class="toggle-pw" onclick="togglePw()" tabindex="-1" aria-label="비밀번호 보기">
        <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button class="submit" id="btn" onclick="decrypt()">로그인</button>
  <p class="error" id="err">비밀번호가 올바르지 않습니다</p>
</div>

document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') decrypt();
});

function togglePw() {
  const input = document.getElementById('pw');
  input.type = input.type === 'password' ? 'text' : 'password';
  input.focus();
}

async function decrypt() {
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if (!pw) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  err.style.display = 'none';

  try {
    const salt = Uint8Array.from(atob(ENCRYPTED.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(ENCRYPTED.iv), c => c.charCodeAt(0));
    const authTag = Uint8Array.from(atob(ENCRYPTED.authTag), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(ENCRYPTED.data), c => c.charCodeAt(0));

    const keyMaterial = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );

    const combined = new Uint8Array(data.length + authTag.length);
    combined.set(data);
    combined.set(authTag, data.length);

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv }, key, combined
    );

    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '로그인';
    err.style.display = 'block';
  }
}
</script>
