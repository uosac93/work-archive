<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박양훈 세무사 — 업무 자료실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #090909;
  padding: 20px;
}
.top-label {
  font-size: 12px; font-weight: 500;
  color: #C5A55A;
  letter-spacing: 6px; text-transform: uppercase;
  margin-bottom: 16px; text-align: center;
}
h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 28px; font-weight: 700;
  color: #EDEDED;
  text-align: center;
  margin-bottom: 36px;
}
.card {
  width: 400px; max-width: 100%;
  background: #111111;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 32px 28px 28px;
}
.field { margin-bottom: 20px; }
.field label {
  display: block; font-size: 13px; font-weight: 700;
  color: #C5A55A; margin-bottom: 10px;
}
.field input {
  width: 100%; height: 48px; padding: 0 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: #ddd; font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: #C5A55A; }
.field input::placeholder { color: rgba(255,255,255,0.3); }
.btn {
  width: 100%; height: 48px;
  background: #C5A55A;
  color: #1A1207; border: none; border-radius: 6px;
  font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: 2px;
  cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #D4B46A; }
.btn:disabled { background: #2A2F38; color: #555; cursor: not-allowed; }
.error {
  color: #E8755A; font-size: 13px; margin-top: 12px;
  display: none; text-align: center;
}
.footer {
  margin-top: 24px; text-align: center;
  font-size: 13px; color: #4A8EC2;
}
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.15); border-top-color: #1A1207; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 480px) {
  h1 { font-size: 24px; }
  .card { padding: 24px 20px 20px; }
}
</style>
</head>
<body>
<p class="top-label">Tax Office</p>
<h1>박양훈 세무사</h1>
<div class="card">
  <div class="field">
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="비밀번호" autofocus>
  </div>
  <button class="btn" id="btn" onclick="decrypt()">로그인</button>
  <p class="error" id="err">비밀번호가 올바르지 않습니다</p>
</div>
<p class="footer">문의사항은 관리자에게 연락하세요</p>

document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') decrypt();
});

async function decrypt() {
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if (!pw) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> ';
  err.style.display = 'none';

  try {
    const salt = Uint8Array.from(atob(ENCRYPTED.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(ENCRYPTED.iv), c => c.charCodeAt(0));
    const authTag = Uint8Array.from(atob(ENCRYPTED.authTag), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(ENCRYPTED.data), c => c.charCodeAt(0));

    const keyMaterial = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );

    const combined = new Uint8Array(data.length + authTag.length);
    combined.set(data);
    combined.set(authTag, data.length);

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv }, key, combined
    );

    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '로그인';
    err.style.display = 'block';
  }
}
</script>
